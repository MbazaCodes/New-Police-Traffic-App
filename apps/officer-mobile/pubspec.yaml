name: officer_mobile
description: TZ Police Digital Platform — Officer Mobile App (Tanzania Police Force)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Routing
  go_router: ^14.2.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Fonts & icons
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lucide_icons_flutter: ^3.0.8
  supabase_flutter: ^2.16.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/police-logo.png
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: assets/police-logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/police-logo.png
